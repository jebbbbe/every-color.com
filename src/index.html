<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Every RGB Color</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Scrollable list of every single RGB color.">
        <link rel="canonical" href="https://every-color.com" />
        <meta property="og:description" content="Scrollable list of every single RGB color.">
        <meta property="og:image" content="https://every-color.com/preview.jpg">
        <meta property="og:url" content="https://every-color.com" />
        <meta property="og:type" content="website" />
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Every RGB Color" />
        <meta name="twitter:description" content="Scrollable list of every single RGB color." />
        <meta name="twitter:image" content="https://every-color.com/preview.jpg" />
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "WebPage",
                "name": "Every RGB Color",
                "description": "Scrollable list of every single RGB color.",
                "url": "https://every-color.com",
                "image": "https://every-color.com/preview.jpg"
            }
        </script>
        <link rel="icon" type="image/x-icon" href="/assets/rainbow-svgrepo-com.svg" />
        <link type="text/css" rel="stylesheet" href="main.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@100..900&display=swap" rel="stylesheet">
        <!-- <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet"> -->
        <!-- <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet"> -->
    </head>
    <body>
        <div class="loader"></div>

        <div class="custom-scrollbar">
            <div class="scroll-thumb"></div>
        </div>

        <div id="root">

            <header id="header">
                <div class="row-box">
                    <h1 class="title">EVERY RGB COLOR</h1>
                     <div class="icon-tray">
                        <a id="play-button" alt="Play Icon" aria-label="Play Color Animation"></a>
                        <a id="fullscreen-button" alt="Fullscreen Icon" aria-label="Enter FullScreen"></a>
                        <a id="hide-text-button" alt="Hide Text Icon" aria-label="Hide Text"></a>
                        <a id="desciption-button" target="_blank" rel="noopener noreferrer" href="https://jessebassett.com" alt="Desciption Icon" aria-label="Enter FullScreen"></a>
                        <a id="code-button" target="_blank" rel="noopener noreferrer" href="https://github.com/jebbbbe/every-color" alt="Code Icon" aria-label="View Code Source"></a>
                        <button id="openSettings" class="settings-btn" aria-label="Open Settings" alt="Settings Icon"></button>
                    </div>
                </div>
            </header>

            <div class="label-height">
                <div id="template" class="row-thing row-box"> <!-- this is used as the node for each row.  -->
                    <div class="spacer"></div>
                    <div class="spacer"></div>
                    <div class="colName" tabindex="0">Name</div>
                    <div class="spacer-between"></div>
                    <div class="colHex"  tabindex="0">Color</div>
                    <div class="spacer"></div>
                </div>
            </div>

            <main>
                <div id="row-holder"></div>
            </main>

            <footer></footer>
        </div>
        
        <!-- settings modal -->
        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <span id="closeModal" class="close">&times;</span>
                <p>SETTINGS</p>
                <div class="settings-container">

                    <form id="colorFormat" class="settings-form">
                        <label for="hashSelect">Color Format</label>
                    </form>

                    <form id="hashSelect" class="settings-form">
                        <label for="hashSelect">Color Order</label>
                    </form>

                    <form id="visionSelect" class="settings-form">
                        <label for="visionSelect">Vision Options</label>
                    </form>

                </div>
            </div>
        </div>




        
        <script type="module" src="./main.js" defer></script>
    </body>
</html>
