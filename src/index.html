<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/x-icon" href="chef-man-cap-svgrepo-com.svg" />
        <title>every rgb color</title>
        <link type="text/css" rel="stylesheet" href="main.css" />
    </head>
    <body>
        <div class="loader"></div>

        <div class="custom-scrollbar">
            <div class="scroll-thumb"></div>
        </div>

        <div id="root">
            <header>
                <div class="row-box">
                    <h1 class="title">Every RGB Color</h1>

                    <!-- <button id="openSettings">Settings</button> -->
                     <div class="icon-tray">
                        <a target="_blank" rel="noopener noreferrer" href="https://www.github.com">
                            <img src="./code.svg" alt="Settings Icon" aria-label="View Code Source">
                        </a>
                        <button id="openSettings" class="settings-btn" aria-label="Open Settings">
                            <img src="./gear.svg" alt="Settings Icon">
                        </button>
                        <div></div>
                    </div>

                    
                </div>
            </header>
            <div class="label-height">
                <div class="row-thing row-box">
                    <div class="index">Index</div>
                    <div class="hexNum">Hexidecimal</div>
                    <div></div>
                    <div class="colName">Name</div>
                    <div class="colHex">Color</div>
                    <div class="rehash">Rehash</div>
                    <div></div>
                </div>
            </div>

            <main>
                <div id="row-holder"></div>
            </main>

            <footer></footer>
        </div>
        
        <!-- settings modal -->
        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <span id="closeModal" class="close">&times;</span>
                <p>Settings</p>
                <div class="settings-container">

                    <form id="colorFormat" class="settings-form">
                        <label for="hashSelect">color format</label>
                    </form>

                    <form id="colorBlindSelect" class="settings-form">
                        <label for="colorBlindSelect">color blind options</label>
                    </form>

                    <form id="hashSelect" class="settings-form">
                        <label for="hashSelect">hash function</label>
                    </form>

                    <div class="settings-toggle">
                        <label for="useAlpha">Use Alpha</label>
                        <input type="checkbox" id="useAlpha" name="useAlpha" value="Bike" />
                    </div>

                </div>
            </div>
        </div>




        
        <!-- <script type="module" src="./Library/hash.js"></script> -->
        <script type="module" src="./main.js"></script>
    </body>
</html>
